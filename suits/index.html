<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider-Man — Interactive Suits</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <script type="importmap">
        {
          "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
          }
        }
    </script>
</head>
<body>

    <!-- Loading Overlay -->
    <div id="loading-overlay">
        <div class="loading-inner">
            <p class="loading-label">INITIALIZING SUIT DATA</p>
            <div class="loading-bar-track">
                <div class="loading-bar-fill" id="loading-bar-fill"></div>
            </div>
            <p class="loading-percent" id="loading-percent">0%</p>
        </div>
    </div>

    <!-- Main Viewer -->
    <div class="viewer-root">
        <canvas id="suits-canvas"></canvas>

        <!-- Top bar -->
        <header class="top-bar">
            <a href="../index.html" class="back-link">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                BACK
            </a>
            <h1 class="page-title">ALL SUITS</h1>
            <div class="counter" id="suit-counter">1 / 8</div>
        </header>

        <!-- Suit name -->
        <div class="suit-name-wrap">
            <p class="suit-subtitle">SPIDER-MAN</p>
            <h2 class="suit-name" id="suit-name">HOMEMADE SUIT</h2>
        </div>

        <!-- Navigation arrows -->
        <button class="nav-arrow nav-prev" id="btn-prev" aria-label="Previous suit">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <button class="nav-arrow nav-next" id="btn-next" aria-label="Next suit">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </button>

        <!-- Bottom controls -->
        <div class="bottom-controls">
            <div class="ctrl-row">
                <button class="ctrl-btn" id="btn-autorotate">
                    <svg id="rotate-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6"/><path d="M21.34 15.57a10 10 0 1 1-.57-8.38"/></svg>
                    <span id="rotate-label">AUTO ROTATE: OFF</span>
                </button>
                <button class="ctrl-btn" id="btn-rotatemode">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M2 12h4M18 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
                    <span id="rotatemode-label">MODEL ONLY</span>
                </button>
            </div>
            <p class="hint-text" id="hint-text">DRAG TO ROTATE &nbsp;·&nbsp; SCROLL TO ZOOM</p>
        </div>

        <!-- Suit dots indicator -->
        <div class="suit-dots" id="suit-dots"></div>
    </div>

    <script type="module" src="suits-viewer.js"></script>
</body>
</html>
